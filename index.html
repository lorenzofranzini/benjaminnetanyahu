<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong 2 Giocatori</title>

<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #222;
    color: white;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
}

canvas {
    border: 4px solid white;
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

.ui {
    position: absolute;
    top: 20px;
    text-align: center;
    pointer-events: none;
}
</style>

</head>

<body>

<div class="ui">
    <h1>PONG</h1>
    <p>Sinistra: Mouse | Destra: ↑ ↓</p>
</div>

<canvas id="pongCanvas"></canvas>

<script>
const canvas = document.getElementById("pongCanvas");
const ctx = canvas.getContext("2d");

canvas.width = 800;
canvas.height = 400;

// Immagine sfondo
const bgImage = new Image();
bgImage.src = "https://upload.wikimedia.org/wikipedia/commons/d/d4/Flag_of_Israel.svg";

// Palla
const ball = {
    x: canvas.width/2,
    y: canvas.height/2,
    radius: 10,
    speed: 5,
    velocityX: 5,
    velocityY: 5
};

// Giocatore 1 (mouse)
const user = {
    x: 0,
    y: canvas.height/2 - 50,
    width: 10,
    height: 100,
    score: 0
};

// Giocatore 2 (tastiera)
const player2 = {
    x: canvas.width - 10,
    y: canvas.height/2 - 50,
    width: 10,
    height: 100,
    score: 0,
    speed: 7
};

// Rete
const net = {
    x: canvas.width/2 - 1,
    width: 2,
    height: 10
};

// Controllo mouse
canvas.addEventListener("mousemove", e => {
    let rect = canvas.getBoundingClientRect();
    user.y = e.clientY - rect.top - user.height/2;
});

// Controllo tastiera
document.addEventListener("keydown", e => {
    if (e.key === "ArrowUp") player2.y -= player2.speed;
    if (e.key === "ArrowDown") player2.y += player2.speed;
});

// Limiti
function clamp() {
    user.y = Math.max(0, Math.min(canvas.height - user.height, user.y));
    player2.y = Math.max(0, Math.min(canvas.height - player2.height, player2.y));
}

// Collisione
function collision(b, p) {
    return b.x - b.radius < p.x + p.width &&
           b.x + b.radius > p.x &&
           b.y - b.radius < p.y + p.height &&
           b.y + b.radius > p.y;
}

// Reset palla
function resetBall() {
    ball.x = canvas.width/2;
    ball.y = canvas.height/2;
    ball.velocityX = -ball.velocityX;
    ball.speed = 5;
}

// Update
function update() {
    ball.x += ball.velocityX;
    ball.y += ball.velocityY;

    if (ball.y < 0 || ball.y > canvas.height) {
        ball.velocityY *= -1;
    }

    let player = (ball.x < canvas.width/2) ? user : player2;

    if (collision(ball, player)) {
        let collidePoint = ball.y - (player.y + player.height/2);
        collidePoint /= (player.height/2);

        let angle = collidePoint * Math.PI/4;
        let direction = (ball.x < canvas.width/2) ? 1 : -1;

        ball.velocityX = direction * ball.speed * Math.cos(angle);
        ball.velocityY = ball.speed * Math.sin(angle);

        ball.speed += 0.2;
    }

    if (ball.x < 0) {
        player2.score++;
        resetBall();
    }

    if (ball.x > canvas.width) {
        user.score++;
        resetBall();
    }

    clamp();
}

// Disegni
function drawRect(x,y,w,h) {
    ctx.fillStyle = "white";
    ctx.fillRect(x,y,w,h);
}

function drawCircle(x,y,r) {
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fill();
}

function drawText(text,x,y) {
    ctx.fillStyle = "white";
    ctx.font = "40px Courier";
    ctx.fillText(text,x,y);
}

// Render
function render() {
    // Sfondo immagine
    ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);

    // Overlay scuro
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Rete
    for(let i=0;i<canvas.height;i+=15){
        drawRect(net.x,i,net.width,net.height);
    }

    drawText(user.score, canvas.width/4, 50);
    drawText(player2.score, 3*canvas.width/4, 50);

    drawRect(user.x,user.y,user.width,user.height);
    drawRect(player2.x,player2.y,player2.width,player2.height);

    drawCircle(ball.x,ball.y,ball.radius);
}

// Loop
function game(){
    update();
    render();
}

setInterval(game,1000/60);
</script>

</body>
</html>
